name: Reusable Docker Build & Push

# Reusable workflow: build a Docker image, push to GHCR, and scan it.
# The image tag is parameterized so each environment gets its own tag.
on:
  workflow_call:
    inputs:
      image-tag:
        description: "Primary tag for the image, e.g. dev / test / prod / v1.2.3"
        type: string
        required: true
      add-latest:
        description: "Also tag the image as :latest (use for releases)"
        type: boolean
        default: false
      scan-exit-code:
        description: "Trivy exit code on HIGH/CRITICAL findings: '0' report-only, '1' block"
        type: string
        default: "0"
    outputs:
      image-digest:
        description: "Immutable digest (sha256:...) of the pushed image, for GitOps promotion"
        value: ${{ jobs.docker.outputs.image-digest }}

jobs:
  docker:
    name: Build & Push (${{ inputs.image-tag }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name automatically
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.image-tag }}
            type=sha,prefix=${{ inputs.image-tag }}-,format=short
            type=raw,value=latest,enable=${{ inputs.add-latest }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
      - name: Scan built image with Trivy
        # Image names must be lowercase; lowercase the repo then scan the tag we pushed.
        # --ignore-unfixed: only fail on vulnerabilities that actually have a fix
        # available, so the gate stays actionable instead of blocking on unpatchable
        # upstream OS CVEs.
        run: |
          image="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          trivy image --severity HIGH,CRITICAL --ignore-unfixed \
            --exit-code ${{ inputs.scan-exit-code }} \
            --no-progress "${image}:${{ inputs.image-tag }}"
