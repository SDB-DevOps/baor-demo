name: Dev Pipeline

# Push to dev -> CI, build the :dev image, deploy to the development environment.
on:
  push:
    branches: [dev]

concurrency:
  group: dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/_reusable-ci.yml

  build:
    needs: ci
    uses: ./.github/workflows/_reusable-docker.yml
    with:
      image-tag: dev
    secrets: inherit

  # "Deploy" = write the new image digest into the GitOps config repo.
  # Argo CD (dev app, auto-sync) then rolls it out to the development cluster.
  deploy:
    needs: build
    uses: ./.github/workflows/_reusable-bump.yml
    with:
      overlay: dev
      image-digest: ${{ needs.build.outputs.image-digest }}
    secrets: inherit
