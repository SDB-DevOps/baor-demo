name: Prod Pipeline

# Push to prod -> CI, build the :prod image, then a MANUAL-APPROVAL deploy to production.
on:
  push:
    branches: [prod]

concurrency:
  group: prod-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-flight production run

jobs:
  ci:
    uses: ./.github/workflows/_reusable-ci.yml
    with:
      run-integration: true

  build:
    needs: ci
    uses: ./.github/workflows/_reusable-docker.yml
    with:
      image-tag: prod
      # Block the pipeline if the production image has HIGH/CRITICAL CVEs
      scan-exit-code: "1"
    secrets: inherit

  # Manual approval gate. The 'production' environment must have Required
  # reviewers configured in Settings -> Environments, so this job pauses until
  # a human approves — BEFORE any change reaches the GitOps repo.
  approval:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approve production promotion
        run: echo "Approved — promoting the :prod image digest to the GitOps repo."

  # After approval, write the digest into the config repo. Argo CD (prod app)
  # then syncs it to production. `needs: build` is kept so the digest output is
  # in scope; `needs: approval` enforces the gate.
  deploy:
    needs: [build, approval]
    uses: ./.github/workflows/_reusable-bump.yml
    with:
      overlay: prod
      image-digest: ${{ needs.build.outputs.image-digest }}
    secrets: inherit
