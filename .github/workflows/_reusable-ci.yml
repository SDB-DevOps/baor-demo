name: Reusable CI

# Reusable workflow: lint + test + security.
# Called by pr.yml / dev.yml / test.yml / prod.yml / main.yml.
on:
  workflow_call:
    inputs:
      run-integration:
        description: "Run the heavier integration test suite"
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy type check
        run: mypy src

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest
      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Audit dependencies for known vulnerabilities
        run: pip-audit
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
      - name: Scan filesystem with Trivy
        # --ignore-unfixed: only fail on vulnerabilities that have an available fix
        run: trivy fs --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress .

  integration:
    name: Integration Tests
    # Only runs when the caller passes run-integration: true (e.g. the test branch)
    if: ${{ inputs.run-integration }}
    runs-on: ubuntu-latest
    # Example: spin up dependencies the integration suite needs
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready" --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run integration tests
        # TODO: replace with the real integration suite, e.g. pytest -m integration
        run: echo "Placeholder for integration tests (DB is available at localhost:5432)."
