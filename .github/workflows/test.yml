name: Test Pipeline

# Push to test -> CI (with integration tests), build the :test image, deploy to test env.
on:
  push:
    branches: [test]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/_reusable-ci.yml
    with:
      run-integration: true

  build:
    needs: ci
    uses: ./.github/workflows/_reusable-docker.yml
    with:
      image-tag: test
    secrets: inherit

  # "Deploy" = write the new image digest into the GitOps config repo.
  # Argo CD (test app, auto-sync) then rolls it out to the test cluster.
  deploy:
    needs: build
    uses: ./.github/workflows/_reusable-bump.yml
    with:
      overlay: test
      image-digest: ${{ needs.build.outputs.image-digest }}
    secrets: inherit
